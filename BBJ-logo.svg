<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="120" height="160" rx="10" fill="#152d1c" stroke="#c9952a" stroke-width="3"/>
  <rect x="5" y="5" width="110" height="150" rx="7" fill="none" stroke="#c9952a" stroke-width="1" opacity="0.4"/>

  <!-- Corner marks (playing card J / spade) -->
  <text x="10" y="24" font-family="Georgia,serif" font-size="16" fill="#c9952a" font-weight="bold">J</text>
  <text x="11" y="36" font-family="Georgia,serif" font-size="12" fill="#c9952a">♠</text>
  <g transform="rotate(180,60,80)">
    <text x="10" y="24" font-family="Georgia,serif" font-size="16" fill="#c9952a" font-weight="bold">J</text>
    <text x="11" y="36" font-family="Georgia,serif" font-size="12" fill="#c9952a">♠</text>
  </g>

  <!-- Body: dark maroon waistcoat -->
  <path d="M14,160 L14,118 Q18,108 30,105 L46,100 L60,108 L74,100 L90,105 Q102,108 106,118 L106,160Z" fill="#2c0a10"/>
  <!-- Waistcoat pinstripes -->
  <line x1="45" y1="110" x2="42" y2="160" stroke="#5a1a20" stroke-width="1.5" opacity="0.5"/>
  <line x1="75" y1="110" x2="78" y2="160" stroke="#5a1a20" stroke-width="1.5" opacity="0.5"/>
  <!-- White shirt -->
  <path d="M48,101 L60,112 L72,101 L68,96 L52,96Z" fill="#e8e0cc"/>
  <!-- Bow tie -->
  <polygon points="46,96 53,92 60,97 67,92 74,96 67,100 60,97 53,100" fill="#7a1826"/>
  <ellipse cx="60" cy="96" rx="3" ry="3" fill="#8a2030"/>

  <!-- Neck -->
  <rect x="53" y="86" width="14" height="14" rx="4" fill="#7a4030"/>

  <!-- Ears (behind head) -->
  <ellipse cx="36" cy="73" rx="4.5" ry="6" fill="#7a4030"/>
  <ellipse cx="84" cy="73" rx="4.5" ry="6" fill="#7a4030"/>

  <!-- Head -->
  <ellipse cx="60" cy="68" rx="24" ry="26" fill="#7a4030"/>

  <!-- Curly hair (dark + grey salt-and-pepper) -->
  <circle cx="40" cy="56" r="11" fill="#171717"/>
  <circle cx="50" cy="46" r="11" fill="#171717"/>
  <circle cx="62" cy="43" r="10" fill="#171717"/>
  <circle cx="73" cy="47" r="10" fill="#171717"/>
  <circle cx="82" cy="55" r="9"  fill="#1c1c1c"/>
  <circle cx="37" cy="66" r="8"  fill="#1c1c1c"/>
  <circle cx="85" cy="64" r="7"  fill="#1c1c1c"/>
  <!-- Grey highlights -->
  <circle cx="58" cy="43" r="5" fill="#5a5a5a" opacity="0.7"/>
  <circle cx="68" cy="45" r="5" fill="#5a5a5a" opacity="0.7"/>
  <circle cx="78" cy="52" r="3" fill="#555"   opacity="0.6"/>

  <!-- Eye whites -->
  <ellipse cx="51" cy="66" rx="5" ry="4" fill="#f0e4d8"/>
  <ellipse cx="69" cy="66" rx="5" ry="4" fill="#f0e4d8"/>
  <!-- Pupils -->
  <circle cx="52" cy="66" r="3" fill="#180800"/>
  <circle cx="69" cy="66" r="3" fill="#180800"/>
  <!-- Eye shine -->
  <circle cx="53.2" cy="64.8" r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="70.2" cy="64.8" r="1.2" fill="#fff" opacity="0.9"/>

  <!-- Eyebrows -->
  <path d="M46,60 Q51,57 56,60" stroke="#151515" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M64,59.5 Q69,56.5 74,59.5" stroke="#151515" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58,74 Q60,79 62,74" stroke="#5c2018" stroke-width="1.7" fill="none" stroke-linecap="round"/>

  <!-- Smirk -->
  <path d="M50,80 Q55,85 65,82 L68,79" stroke="#361008" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Goatee -->
  <path d="M54,81 Q60,81 66,81 Q65,90 60,92 Q55,90 54,81Z" fill="#202020"/>

  <!-- Name badge -->
  <rect x="16" y="120" width="42" height="16" rx="3" fill="#c9952a"/>
  <text x="37" y="131.5" font-family="Georgia,serif" font-size="8" fill="#0b1a10" text-anchor="middle" font-weight="bold" letter-spacing="0.6">J. BLACK</text>

  <!-- Playing card in hand -->
  <g transform="translate(86,108) rotate(12)">
    <rect width="18" height="25" rx="2" fill="white" stroke="#c9952a" stroke-width="1"/>
    <text x="9" y="17" font-size="14" text-anchor="middle" fill="#b82020" font-family="sans-serif">♥</text>
  </g>

  <!-- Bottom title -->
  <text x="60" y="153" font-family="Georgia,serif" font-size="7" fill="#c9952a" text-anchor="middle" letter-spacing="1" font-style="italic">Black Jack's BlackJack</text>
</svg>
